syntax = "proto3";

package flexium;

// GPU Orchestrator service for managing training processes
service GPUOrchestrator {
    // Register a new training process with the orchestrator
    rpc Register(RegisterRequest) returns (RegisterResponse);

    // Send periodic heartbeat to indicate process is alive
    rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);

    // Request migration to a different device
    rpc Migrate(MigrateRequest) returns (MigrateResponse);

    // Unregister a process when it terminates
    rpc Unregister(UnregisterRequest) returns (UnregisterResponse);

    // List all registered processes
    rpc ListProcesses(ListProcessesRequest) returns (ListProcessesResponse);

    // Get status of a specific process
    rpc GetProcessStatus(GetProcessStatusRequest) returns (GetProcessStatusResponse);

    // Get device utilization information
    rpc GetDeviceStatus(GetDeviceStatusRequest) returns (GetDeviceStatusResponse);

    // Request error recovery assistance (find suitable GPU after error)
    rpc RequestErrorRecovery(ErrorRecoveryRequest) returns (ErrorRecoveryResponse);

    // Mark a GPU as healthy (manual recovery)
    rpc MarkGPUHealthy(MarkGPUHealthyRequest) returns (MarkGPUHealthyResponse);

    // Get list of unhealthy GPUs
    rpc GetUnhealthyGPUs(GetUnhealthyGPUsRequest) returns (GetUnhealthyGPUsResponse);

    // Notify that migration is complete
    rpc CompleteMigration(CompleteMigrationRequest) returns (CompleteMigrationResponse);

    // Pause a running process (checkpoint + free GPU)
    rpc Pause(PauseRequest) returns (PauseResponse);

    // Resume a paused process on a GPU
    rpc Resume(ResumeRequest) returns (ResumeResponse);

    // Notify that pause is complete (checkpoint saved, GPU freed)
    rpc CompletePause(CompletePauseRequest) returns (CompletePauseResponse);
}

// Request to register a new training process
message RegisterRequest {
    string process_id = 1;           // Unique identifier for the process
    string device = 2;               // Current device (e.g., "cuda:0")
    string hostname = 3;             // Hostname of the machine
    map<string, string> metadata = 4; // Additional metadata
    string gpu_uuid = 5;             // GPU UUID (e.g., "GPU-a1b2c3d4-...")
    string gpu_name = 6;             // GPU model name (e.g., "Tesla V100-SXM2-32GB")

    // Resource requirements
    int32 min_gpus = 7;              // Minimum GPUs required (default: 1)
    int32 max_gpus = 8;              // Maximum GPUs that can be utilized (default: 1)
    int64 max_vram = 9;              // Peak VRAM requirement per GPU in bytes (0 = unlimited)
    bool can_share = 10;             // Can run alongside other processes on same GPU (default: true)
    int32 priority = 11;             // Job priority 0-100, higher = more important (default: 50)
    bool preemptible = 12;           // Can be paused/migrated by higher priority jobs (default: true)
    bool migratable = 13;            // Can be migrated at all (default: true)
}

// Response to registration request
message RegisterResponse {
    bool success = 1;
    string message = 2;
    string assigned_device = 3;      // May differ from requested device
}

// Report of a single GPU device state
message DeviceReport {
    string gpu_uuid = 1;             // GPU UUID (e.g., "GPU-abc123...")
    string gpu_name = 2;             // Model name (e.g., "Tesla V100-SXM2-32GB")
    string hostname = 3;             // Host where GPU resides
    int64 memory_total = 4;          // Total VRAM in bytes
    int64 memory_used = 5;           // Used VRAM in bytes (from nvidia-smi)
    int64 memory_free = 6;           // Free VRAM in bytes
    int32 gpu_utilization = 7;       // GPU compute utilization % (0-100)
    int32 temperature = 8;           // GPU temperature in Celsius
    int32 power_usage = 9;           // Power draw in Watts
    int32 process_count = 10;        // Number of processes using this GPU
}

// Heartbeat request to indicate process is alive
message HeartbeatRequest {
    string process_id = 1;
    string device = 2;
    // Fields 3-4 reserved (removed: batch_idx, epoch)
    int64 memory_allocated = 5;      // GPU memory allocated in bytes
    int64 memory_reserved = 6;       // GPU memory reserved in bytes
    string gpu_uuid = 7;             // GPU UUID for reliable identification (logical/target GPU)
    string gpu_name = 8;             // GPU model name
    int64 gpu_pid = 9;               // PID as seen by nvidia-smi (host PID in containers)
    int64 container_pid = 10;        // PID from os.getpid() (container PID)
    repeated DeviceReport visible_devices = 11;  // All GPUs visible to this worker
    // After driver migration migration, pynvml reports memory on the INITIAL GPU
    // (first GPU started on), not the target GPU. This field tracks where pynvml
    // actually sees our memory for accurate memory_managed attribution.
    string pynvml_gpu_uuid = 12;     // GPU UUID where pynvml reports our memory
    // Number of CUDA devices visible via CUDA_VISIBLE_DEVICES (torch.cuda.device_count())
    // This is used to filter migration dropdown options in the dashboard.
    int32 cuda_device_count = 13;
}

// Heartbeat response
message HeartbeatResponse {
    bool success = 1;

    // Migration directive (if orchestrator wants to migrate this process)
    bool should_migrate = 2;
    string target_device = 3;
}

// Request to migrate a process to a different device
message MigrateRequest {
    string process_id = 1;
    string target_device = 2;        // Target device (e.g., "cuda:1", "cpu")
}

// Response to migration request
message MigrateResponse {
    bool success = 1;
    string message = 2;
}

// Request to unregister a process
message UnregisterRequest {
    string process_id = 1;
}

// Response to unregister request
message UnregisterResponse {
    bool success = 1;
}

// Request to list all processes
message ListProcessesRequest {
    // Optional filter by device
    string device_filter = 1;
}

// Response with list of processes
message ListProcessesResponse {
    repeated ProcessInfo processes = 1;
}

// Information about a registered process
message ProcessInfo {
    string process_id = 1;
    string device = 2;
    string hostname = 3;
    string status = 4;               // "running", "migrating", "stopped"
    // Fields 5-6 reserved (removed: batch_idx, epoch)
    int64 memory_allocated = 7;
    int64 memory_reserved = 8;
    int64 last_heartbeat = 9;        // Unix timestamp
    map<string, string> metadata = 10;
    string gpu_uuid = 11;            // GPU UUID
    string gpu_name = 12;            // GPU model name

    // Resource requirements
    int32 min_gpus = 13;             // Minimum GPUs required
    int32 max_gpus = 14;             // Maximum GPUs that can be utilized
    int64 max_vram = 15;             // Peak VRAM requirement per GPU in bytes (0 = unlimited)
    bool can_share = 16;             // Can run alongside other processes on same GPU
    int32 priority = 17;             // Job priority 0-100
    bool preemptible = 18;           // Can be paused/migrated by higher priority jobs
    bool migratable = 19;            // Can be migrated at all

    int64 gpu_pid = 20;              // PID as seen by nvidia-smi (host PID in containers)
    int64 container_pid = 21;        // PID from os.getpid() (container PID)
    int64 peak_memory = 22;          // Peak memory usage observed (for inferred max_vram)
}

// Request to get status of a specific process
message GetProcessStatusRequest {
    string process_id = 1;
}

// Response with process status
message GetProcessStatusResponse {
    bool found = 1;
    ProcessInfo process = 2;
}

// Request to get device utilization
message GetDeviceStatusRequest {
    // Empty means all devices
    string device = 1;
}

// Response with device status
message GetDeviceStatusResponse {
    repeated DeviceInfo devices = 1;
}

// Information about a device
message DeviceInfo {
    string device = 1;
    int32 process_count = 2;         // Number of processes on this device
    int64 total_memory = 3;          // Total GPU memory in bytes
    int64 used_memory = 4;           // Used GPU memory in bytes
    repeated string process_ids = 5; // IDs of processes on this device
    string gpu_uuid = 6;             // GPU UUID
    string gpu_name = 7;             // GPU model name
}

// Request error recovery assistance
message ErrorRecoveryRequest {
    string process_id = 1;           // Process requesting recovery
    string error_type = 2;           // "OOM", "DEVICE_ASSERT", "ECC", "LAUNCH_FAILURE"
    string current_device = 3;       // Current device (to avoid)
    int64 memory_needed = 4;         // For OOM: estimated VRAM needed in bytes
    string current_gpu_uuid = 5;     // Current GPU UUID (to avoid)
}

// Response with target device for recovery
message ErrorRecoveryResponse {
    bool success = 1;                // True if a suitable device was found
    string target_device = 2;        // Target device (e.g., "cuda:1", "cpu")
    string target_gpu_uuid = 3;      // Target GPU UUID
    string message = 4;              // Status message
}

// Request to mark a GPU as healthy
message MarkGPUHealthyRequest {
    string gpu_uuid = 1;             // GPU UUID to mark as healthy
}

// Response to mark healthy request
message MarkGPUHealthyResponse {
    bool success = 1;
    string message = 2;
}

// Request to get unhealthy GPUs
message GetUnhealthyGPUsRequest {
}

// Response with unhealthy GPU list
message GetUnhealthyGPUsResponse {
    repeated UnhealthyGPUInfo gpus = 1;
}

// Information about an unhealthy GPU
message UnhealthyGPUInfo {
    string gpu_uuid = 1;             // GPU UUID
    string reason = 2;               // Reason marked unhealthy
    int64 marked_at = 3;             // Unix timestamp when marked
    int64 recovers_at = 4;           // Unix timestamp when auto-recovers
}

// Request to notify migration complete
message CompleteMigrationRequest {
    string process_id = 1;           // Process that completed migration
    string new_device = 2;           // New device after migration
    string gpu_uuid = 3;             // GPU UUID of new device
    string gpu_name = 4;             // GPU name of new device
    int64 memory_reserved = 5;       // Memory reserved on new device
}

// Response to complete migration notification
message CompleteMigrationResponse {
    bool success = 1;
}

// Request to pause a process (checkpoint + free GPU)
message PauseRequest {
    string process_id = 1;           // Process to pause
}

// Response to pause request
message PauseResponse {
    bool success = 1;
    string message = 2;
    string checkpoint_path = 3;      // Path to saved checkpoint
}

// Request to resume a paused process
message ResumeRequest {
    string process_id = 1;           // Process to resume
    string target_device = 2;        // Target GPU (e.g., "cuda:0"). Empty = auto-select
}

// Response to resume request
message ResumeResponse {
    bool success = 1;
    string message = 2;
    string assigned_device = 3;      // GPU where process was assigned to resume
}

// Request to notify pause completion
message CompletePauseRequest {
    string process_id = 1;           // Process that completed pause
    string checkpoint_path = 2;      // Path to saved checkpoint
    string script_path = 3;          // Path to training script (for respawning)
}

// Response to pause completion
message CompletePauseResponse {
    bool success = 1;
}
